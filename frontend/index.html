<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aroma Type — MVP v0</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.18);
      color: #bfdbfe;
      font-size: 14px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 40px;
      line-height: 1.1;
    }

    h2 {
      margin: 0 0 24px;
      font-size: 24px;
      color: #fbbf24;
    }

    .checks {
      background: rgba(0, 0, 0, 0.22);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      font-family: Consolas, monospace;
      font-size: 14px;
      color: #d1fae5;
    }

    .checks div { margin: 6px 0; }

    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #60a5fa;
      color: #0f172a;
    }

    button:hover { background: #93c5fd; }

    #result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(34, 197, 94, 0.16);
      color: #bbf7d0;
      display: none;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">MVP v0</div>

    <h1>Aroma Type</h1>
    <h2>Опросник</h2>

    <section class="checks" aria-label="Smoke-check status">
      <div>✅ App loaded</div>
      <div id="telegram-status">⏳ Telegram SDK checking...</div>
      <div>✅ Environment checking</div>
    </section>

    <button id="smokeCheckButton" type="button">Запустить smoke-check</button>

    <div id="result">✅ Smoke-check passed</div>
  </main>

  <script>
    function initTelegramStatus() {
      const status = document.getElementById("telegram-status");

      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        status.textContent = "✅ Telegram SDK connected";
      } else {
        status.textContent = "✅ Browser fallback mode";
      }
    }

    function runSmokeCheck() {
      const result = document.getElementById("result");
      result.style.display = "block";
      result.textContent = "✅ Smoke-check passed";
    }

    document.addEventListener("DOMContentLoaded", function () {
      initTelegramStatus();

      const button = document.getElementById("smokeCheckButton");
      button.addEventListener("click", runSmokeCheck);
    });
  </script>
</body>
</html>
