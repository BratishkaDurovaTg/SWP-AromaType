openapi: 3.0.3
info:
  title: AromaType API
  version: 0.1.0
  description: API contract for the AromaType backend MVP.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Backend health check
      operationId: getHealth
      tags:
        - System
      responses:
        "200":
          description: Backend is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: aromatype-backend
                version: 0.1.0
  /api/auth/register:
    post:
      summary: Register user
      operationId: registerUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: user@example.com
              password: password123
              role: user
      responses:
        "201":
          description: User registered and JWT issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/login:
    post:
      summary: Login user
      operationId: loginUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: user@example.com
              password: password123
      responses:
        "200":
          description: User authenticated and JWT issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/questions:
    get:
      summary: Get questionnaire questions
      operationId: getQuestions
      tags:
        - Questionnaire
      responses:
        "200":
          description: Active questionnaire questions with answer options.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
  /api/recommendations:
    post:
      summary: Build fragrance recommendations
      description: Builds a basic rule-based recommendation without LLM.
      operationId: buildRecommendations
      tags:
        - Recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
            example:
              answerOptionIds:
                - q1_a1
                - q2_a1
                - q3_a1
                - q4_a2
                - q5_a2
                - q6_a1
                - q7_a2
      responses:
        "200":
          description: User aroma profile and recommended fragrances.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: aromatype-backend
        version:
          type: string
          example: 0.1.0
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 6
          example: password123
        role:
          type: string
          enum:
            - user
            - admin
          default: user
          example: user
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: password123
    AuthResponse:
      type: object
      required:
        - accessToken
        - user
      properties:
        accessToken:
          type: string
          description: JWT access token.
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - user
            - admin
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: invalid_input
        message:
          type: string
          example: Request validation failed.
    Question:
      type: object
      required:
        - id
        - text
        - type
        - sortOrder
        - options
      properties:
        id:
          type: string
          example: q1
        text:
          type: string
          example: Если описать вас в трёх словах через аромат, что это будет?
        type:
          type: string
          enum:
            - single_choice
            - multiple_choice
          example: single_choice
        sortOrder:
          type: integer
          example: 1
        options:
          type: array
          items:
            $ref: "#/components/schemas/AnswerOption"
    AnswerOption:
      type: object
      required:
        - id
        - questionId
        - text
        - value
        - sortOrder
      properties:
        id:
          type: string
          example: q1_a1
        questionId:
          type: string
          example: q1
        text:
          type: string
          example: Спокойный и уверенный
        value:
          type: string
          example: calm_confident
        sortOrder:
          type: integer
          example: 1
    RecommendationRequest:
      type: object
      required:
        - answerOptionIds
      properties:
        answerOptionIds:
          type: array
          minItems: 1
          items:
            type: string
          example:
            - q1_a1
            - q2_a1
            - q3_a1
    RecommendationResponse:
      type: object
      required:
        - profile
        - items
      properties:
        profile:
          $ref: "#/components/schemas/AromaProfile"
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecommendationItem"
    AromaProfile:
      type: object
      required:
        - name
        - description
        - tags
      properties:
        name:
          type: string
          example: Спокойный минималист
        description:
          type: string
          example: Вам подходят чистые, спокойные и ненавязчивые ароматы.
        tags:
          type: array
          items:
            type: string
          example:
            - спокойный
            - чистый
            - офисный
    RecommendationItem:
      type: object
      required:
        - id
        - name
        - brand
        - gender
        - imageUrl
        - price
        - stockStatus
        - score
        - reason
      properties:
        id:
          type: string
          example: fresh-office
        name:
          type: string
          example: Fresh Office
        brand:
          type: string
          example: AromaType
        gender:
          type: string
          example: unisex
        imageUrl:
          type: string
          example: ""
        price:
          type: string
          example: "490.00"
        stockStatus:
          type: string
          example: in_stock
        score:
          type: integer
          example: 75
        reason:
          type: string
          example: "Совпадает с вашим профилем по тегам: свежий, чистый, офисный."
