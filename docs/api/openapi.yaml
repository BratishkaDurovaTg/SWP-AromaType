openapi: 3.0.3
info:
  title: AromaType API
  version: 0.1.0
  description: API contract for the AromaType backend MVP.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Backend health check
      operationId: getHealth
      tags:
        - System
      responses:
        "200":
          description: Backend is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: aromatype-backend
                version: 0.1.0
  /api/questions:
    get:
      summary: Get questionnaire questions
      operationId: getQuestions
      tags:
        - Questionnaire
      responses:
        "200":
          description: Active questionnaire questions with answer options.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
  /api/recommendations:
    post:
      summary: Build fragrance recommendations
      description: Builds a basic rule-based recommendation without LLM.
      operationId: buildRecommendations
      tags:
        - Recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
            example:
              answerOptionIds:
                - q1_a1
                - q2_a1
                - q3_a1
                - q4_a2
                - q5_a2
                - q6_a1
                - q7_a2
                - q8_a2
      responses:
        "200":
          description: User aroma profile and recommended fragrances.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/fragrances/{id}:
    get:
      summary: Get fragrance product card
      operationId: getFragrance
      tags:
        - Fragrances
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: fresh-office
      responses:
        "200":
          description: Fragrance product card with notes and usage metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fragrance"
        "404":
          description: Fragrance not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: aromatype-backend
        version:
          type: string
          example: 0.1.0
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: invalid_input
        message:
          type: string
          example: Request validation failed.
    Question:
      type: object
      required:
        - id
        - text
        - type
        - sortOrder
        - options
      properties:
        id:
          type: string
          example: q1
        text:
          type: string
          example: Если описать вас в трёх словах через аромат, что это будет?
        type:
          type: string
          enum:
            - single_choice
            - multiple_choice
          example: single_choice
        sortOrder:
          type: integer
          example: 1
        options:
          type: array
          items:
            $ref: "#/components/schemas/AnswerOption"
    AnswerOption:
      type: object
      required:
        - id
        - questionId
        - text
        - value
        - sortOrder
      properties:
        id:
          type: string
          example: q1_a1
        questionId:
          type: string
          example: q1
        text:
          type: string
          example: Легко привлеку внимание, я в центре событий.
        value:
          type: string
          example: drive_attention
        sortOrder:
          type: integer
          example: 1
    RecommendationRequest:
      type: object
      required:
        - answerOptionIds
      properties:
        answerOptionIds:
          type: array
          minItems: 1
          items:
            type: string
          example:
            - q1_a1
            - q2_a1
            - q3_a1
    RecommendationResponse:
      type: object
      required:
        - profile
        - items
        - totalItems
      properties:
        profile:
          $ref: "#/components/schemas/AromaProfile"
        items:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/RecommendationItem"
        totalItems:
          type: integer
          example: 4
    AromaProfile:
      type: object
      required:
        - name
        - description
        - tags
        - profileBars
        - characterTraits
        - keyNotes
      properties:
        name:
          type: string
          example: Интеллект и фокус
        description:
          type: string
          example: Вам подходят собранные, глубокие и немного загадочные ароматы.
        tags:
          type: array
          items:
            type: string
          example:
            - Интеллект / Фокус
        profileBars:
          type: array
          items:
            $ref: "#/components/schemas/ScoreMetric"
        characterTraits:
          type: array
          items:
            $ref: "#/components/schemas/ScoreMetric"
        keyNotes:
          type: array
          items:
            type: string
    ScoreMetric:
      type: object
      required:
        - label
        - percent
      properties:
        label:
          type: string
          example: Свежесть
        percent:
          type: integer
          minimum: 0
          maximum: 100
          example: 88
    RecommendationItem:
      type: object
      required:
        - id
        - name
        - brand
        - imageUrl
        - price
        - psychotype
        - psychotypeScores
        - mainAccords
        - keyNotes
        - matchPercent
        - score
        - reason
      properties:
        id:
          type: string
          example: fresh-office
        name:
          type: string
          example: Fresh Office
        brand:
          type: string
          example: AromaType
        imageUrl:
          type: string
          example: ""
        price:
          type: string
          example: "490.00"
        psychotype:
          $ref: "#/components/schemas/Psychotype"
        psychotypeScores:
          $ref: "#/components/schemas/PsychotypeScores"
        mainAccords:
          type: array
          items:
            type: string
        keyNotes:
          type: array
          items:
            type: string
        matchPercent:
          type: integer
          example: 96
        score:
          type: integer
          example: 75
        reason:
          type: string
          example: "Совпадает с вашим профилем по тегам: свежий, чистый, офисный."
    Fragrance:
      type: object
      required:
        - id
        - name
        - brand
        - imageUrl
        - price
        - volumeOptions
        - description
        - topNotes
        - middleNotes
        - baseNotes
        - mainAccords
        - psychotype
        - psychotypeScores
        - isActive
      properties:
        id:
          type: string
          example: fresh-office
        name:
          type: string
          example: Fresh Office
        brand:
          type: string
          example: AromaType
        imageUrl:
          type: string
          example: ""
        price:
          type: string
          example: "490.00"
        volumeOptions:
          type: array
          items:
            $ref: "#/components/schemas/VolumeOption"
        description:
          type: string
          example: Чистый и свежий аромат для учебы, офиса и спокойного повседневного образа.
        topNotes:
          type: array
          items:
            type: string
          example:
            - бергамот
            - лимон
        middleNotes:
          type: array
          items:
            type: string
          example:
            - лаванда
        baseNotes:
          type: array
          items:
            type: string
          example:
            - мускус
        mainAccords:
          type: array
          items:
            type: string
          example:
            - свежий
            - чистый
        psychotype:
          $ref: "#/components/schemas/Psychotype"
        psychotypeScores:
          $ref: "#/components/schemas/PsychotypeScores"
        isActive:
          type: boolean
          example: true
    Psychotype:
      type: string
      enum:
        - drive
        - focus
        - aesthetic
        - power
        - balanced
      example: focus
    PsychotypeScores:
      type: object
      required:
        - drive
        - focus
        - aesthetic
        - power
      properties:
        drive:
          type: integer
          minimum: 0
          maximum: 100
          example: 35
        focus:
          type: integer
          minimum: 0
          maximum: 100
          example: 85
        aesthetic:
          type: integer
          minimum: 0
          maximum: 100
          example: 45
        power:
          type: integer
          minimum: 0
          maximum: 100
          example: 20
    VolumeOption:
      type: object
      required:
        - volumeMl
        - price
      properties:
        volumeMl:
          type: integer
          example: 50
        price:
          type: number
          example: 490
