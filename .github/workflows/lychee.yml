name: Lychee

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/lychee.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "**/*.md"
      - ".github/workflows/lychee.yml"

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './**/*.md'
          fail: true
          failIfEmpty: false
