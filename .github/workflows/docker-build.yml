name: Docker Build

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  backend-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t aromatype-backend:ci .
