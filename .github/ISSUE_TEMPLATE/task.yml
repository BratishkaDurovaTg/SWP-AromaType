name: Task
description: Track implementation, documentation, or operational work.
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: input
    id: deadline
    attributes:
      label: Deadline
      placeholder: 2026-06-19
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Frontend
        - Design
        - Documentation
        - Deployment
    validations:
      required: true
