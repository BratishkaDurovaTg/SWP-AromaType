services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aromatype-backend
    environment:
      APP_ENV: local
      PORT: 8080
      OPENAPI_PATH: /app/docs/api/openapi.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aromatype-postgres
    environment:
      POSTGRES_DB: aromatype
      POSTGRES_USER: aromatype
      POSTGRES_PASSWORD: aromatype
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aromatype -d aromatype"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
