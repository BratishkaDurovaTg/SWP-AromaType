services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aromatype-backend
    environment:
      APP_ENV: local
      PORT: 8080
      OPENAPI_PATH: /app/docs/api/openapi.yaml
      DATABASE_URL: postgres://aromatype:aromatype@postgres:5432/aromatype?sslmode=disable
      JWT_SECRET: local-dev-secret-change-me
      JWT_TTL: 24h
      ADMIN_EMAIL: admin@aromatype.local
      ADMIN_PASSWORD: local-admin-password
      UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aromatype-postgres
    environment:
      POSTGRES_DB: aromatype
      POSTGRES_USER: aromatype
      POSTGRES_PASSWORD: aromatype
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aromatype -d aromatype"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
